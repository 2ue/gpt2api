name: Docker 镜像发布

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-images:
    name: 发布容器镜像
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME || github.repository_owner }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_NAME: gpt2api

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 生成构建变量
        id: vars
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ] || [ -z "${version}" ]; then
            version="sha-${GITHUB_SHA::7}"
          fi

          {
            echo "version=${version}"
            echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: 构建前端产物
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: 构建 Linux/amd64 产物
        shell: bash
        run: |
          mkdir -p deploy/bin

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build \
            -ldflags "-s -w -X main.version=${{ steps.vars.outputs.version }} -X main.buildTime=${{ steps.vars.outputs.build_time }}" \
            -o deploy/bin/gpt2api ./cmd/server

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          pushd "$tmpdir" >/dev/null
          go mod init goose-wrapper >/dev/null 2>&1
          go get github.com/pressly/goose/v3/cmd/goose@v3.20.0 >/dev/null 2>&1
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags "-s -w" -o "$GITHUB_WORKSPACE/deploy/bin/goose" github.com/pressly/goose/v3/cmd/goose
          popd >/dev/null

          ls -lh deploy/bin/gpt2api deploy/bin/goose web/dist/index.html

      - name: 检查 Docker Hub 凭据
        id: gate
        shell: bash
        run: |
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成镜像名
        id: prep
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          {
            echo "images<<EOF"
            echo "ghcr.io/${owner}/${IMAGE_NAME}"
            if [ '${{ steps.gate.outputs.enabled }}' = 'true' ]; then
              echo "docker.io/${DOCKERHUB_USERNAME}/${IMAGE_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录 Docker Hub
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.images }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest

      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha,scope=publish-${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=publish-${{ env.IMAGE_NAME }}

      - name: 跳过说明
        if: ${{ steps.gate.outputs.enabled != 'true' }}
        run: echo "未配置 vars.DOCKERHUB_USERNAME 或 secrets.DOCKERHUB_TOKEN，本次仅发布 GHCR。"
